<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקדמיית הלחימה | מאיר יוסיף</title>
    <style>
        :root { --red: #ff0000; --gold: #ffcc00; --card-bg: #151515; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; margin: 0; }
        
        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://vignette.wikia.nocookie.net/p__/images/a/a0/Jackie_Chan.jpg/revision/latest?cb=20180424171127&path-prefix=protagonist');
            background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 4px solid var(--red);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 סרטונים בשורה */
            gap: 30px; padding: 40px; max-width: 1200px; margin: auto;
        }

        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid #333; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--red); transform: translateY(-5px); }
        
        .card-header { background: var(--red); padding: 12px; font-weight: bold; text-align: center; }
        
        video { 
            width: 100%; aspect-ratio: 16/9; display: block; 
            background: #000; object-fit: cover;
        }

        .actions {
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
        }

        .like-btn {
            background: none; border: 2px solid #444; color: white;
            padding: 5px 15px; border-radius: 20px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .like-btn.active { border-color: var(--red); color: var(--red); }

        footer { text-align: center; padding: 40px; opacity: 0.5; border-top: 1px solid #222; }
    </style>
</head>
<body oncontextmenu="return false;"> <header>
    <h1>אקדמיית הלחימה 🥊</h1>
    <p style="color: var(--gold);">המקום שלך להפוך ללוחם | מאיר יוסיף</p>
</header>

<div class="grid" id="videoGrid"></div>

<footer>© 2026 אקדמיית הלחימה - כל הזכויות שמורות</footer>

<script>
    const grid = document.getElementById('videoGrid');
    
    for (let i = 1; i <= 20; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">שיעור ${i} - מאיר יוסיף</div>
            <video id="vid${i}" controls controlslist="nodownload" oncontextmenu="return false;">
                <source src="video${i}.mp4" type="video/mp4">
            </video>
            <div class="actions">
                <button class="like-btn" onclick="toggleLike(this)">
                    ❤️ <span>0</span>
                </button>
                <span style="font-size: 0.8rem; color: #888;">צפייה ישירה</span>
            </div>
        `;
        grid.appendChild(card);

        // לחיצה כפולה למסך מלא
        const video = card.querySelector('video');
        video.addEventListener('dblclick', function() {
            if (this.requestFullscreen) this.requestFullscreen();
            else if (this.webkitRequestFullscreen) this.webkitRequestFullscreen();
        });
    }

    function toggleLike(btn) {
        btn.classList.toggle('active');
        let count = parseInt(btn.querySelector('span').innerText);
        if(btn.classList.contains('active')) {
            btn.querySelector('span').innerText = count + 1;
        } else {
            btn.querySelector('span').innerText = count - 1;
        }
    }
</script>

</body>
</html>
