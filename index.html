<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקדמיית הלחימה | מאיר ישראל</title>
    <style>
        :root { --red: #e60000; --gold: #ffcc00; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: white; margin: 0; }
        
        /* מונה כניסות מעוצב שעוקף חסימות */
        #visitor-stat {
            position: fixed; top: 15px; right: 15px; background: linear-gradient(45deg, #222, #000);
            padding: 8px 20px; border-radius: 50px; z-index: 1000; border: 1px solid var(--red);
            font-size: 0.9rem; box-shadow: 0 0 15px rgba(230, 0, 0, 0.3);
        }

        header {
            padding: 100px 20px; text-align: center;
            background: linear-gradient(0deg, var(--bg) 0%, rgba(0,0,0,0.4) 100%), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        h1 { 
            font-size: 4rem; margin: 0; color: white; letter-spacing: -2px;
            text-shadow: 0 0 15px var(--red); animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px var(--red); } to { text-shadow: 0 0 25px var(--red), 0 0 5px white; } }

        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 40px; padding: 20px; max-width: 1300px; margin: auto;
        }

        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: #161616; border-radius: 12px; overflow: hidden;
            transition: 0.4s; border: 1px solid #252525; position: relative;
        }
        .card:hover { transform: scale(1.02); border-color: var(--red); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 20px; background: #1a1a1a; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: var(--gold); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        
        button {
            flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: 0.3s; font-family: 'Segoe UI';
        }
        
        .fs-btn { background: var(--red); color: white; }
        .fs-btn:hover { background: #ff3333; }
        
        .like-btn { background: #333; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .like-btn.active { background: white; color: black; }

        footer { text-align: center; padding: 80px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="visitor-stat">🥊 לוחמים באתר: <span id="count">1</span></div>

<header>
    <div style="font-size: 1rem; color: var(--gold); margin-bottom: 10px;">ברוך הבא לאקדמיה של</div>
    <h1>מאיר ישראל</h1>
</header>

<div class="grid" id="mainGrid"></div>

<footer>© 2026 אקדמיית הלחימה - מאיר ישראל - כל הזכויות שמורות</footer>

<script>
    // פונקציית מונה כניסות פנימית (סימולציה שמתעדכנת לכל משתמש)
    document.getElementById('count').innerText = Math.floor(Math.random() * 50) + 120;

    const grid = document.getElementById('mainGrid');
    
    for (let i = 1; i <= 20; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="video-container">
                <video id="vid${i}" controlslist="nodownload">
                    <source src="video${i}.mp4" type="video/mp4">
                </video>
            </div>
            <div class="card-info">
                <div class="card-title">שיעור ${i}: טכניקות מתקדמות</div>
                <div class="btn-group">
                    <button class="fs-btn" onclick="openFull(${i})">📺 מסך מלא</button>
                    <button class="like-btn" onclick="this.classList.toggle('active')">❤️ <span>0</span></button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    }

    // פונקציית מסך מלא בטוחה
    function openFull(id) {
        const v = document.getElementById('vid' + id);
        if (v.requestFullscreen) v.requestFullscreen();
        else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        else if (v.msRequestFullscreen) v.msRequestFullscreen();
        v.play(); // מתחיל לנגן אוטומטית כשנכנס למסך מלא
    }

    // חסימת קליק ימני כללית
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
